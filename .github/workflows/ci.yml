name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_unigrades
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r server/requirements.txt

    - name: Run tests with pytest
      env:
        DATABASE_URL: "postgresql://testuser:testpass@localhost:5432/test_unigrades"
        SECRET_KEY: "test-secret-key-do-not-use-in-production"
      run: |
        pytest server/tests/ -v --cov=server --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-py${{ matrix.python-version }}
        path: htmlcov/

  client-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install client dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run client tests
      # Slow tests (TestGradeSimulatorAgent) require a local Ollama instance and are
      # excluded from CI. Run them locally with: pytest tests/ -v
      run: |
        pytest tests/ -m "not slow" -v --tb=short \
          --cov=agents --cov=services --cov=models --cov=client \
          --cov-report=xml --cov-report=term-missing

    - name: Upload client coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: client-coverage-py${{ matrix.python-version }}
        path: coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: flake8 — critical errors (syntax errors, undefined names)
      # Fails the build. Config read from root .flake8
      run: |
        flake8 . --select=E9,F63,F7,F82 --show-source --count

    - name: flake8 — style warnings
      # Does not fail the build
      run: |
        flake8 . --exit-zero --max-complexity=10 --statistics --count
      continue-on-error: true

    - name: black — formatting check
      # Does not fail the build
      run: |
        black --check .
      continue-on-error: true

    - name: isort — import order check
      # Does not fail the build
      run: |
        isort --check-only .
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit security scan (entire project)
      run: |
        bandit -r . -ll --exclude venv,.git,.pytest_cache
      continue-on-error: true

    - name: Run Safety vulnerability check
      run: |
        safety check --json
      continue-on-error: true

  test-summary:
    needs: [test, client-tests, lint]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Test status
      if: >-
        ${{ needs.test.result == 'failure' ||
            needs.client-tests.result == 'failure' ||
            needs.lint.result == 'failure' }}
      run: |
        echo "One or more required checks failed"
        exit 1

    - name: Success
      if: >-
        ${{ needs.test.result == 'success' &&
            needs.client-tests.result == 'success' &&
            needs.lint.result == 'success' }}
      run: |
        echo "All checks passed successfully!"

  cd:
    name: Build & Push Docker Image
    needs: [test-summary]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/university-grade-calculator:latest
          ghcr.io/${{ github.repository_owner }}/university-grade-calculator:${{ github.sha }}
