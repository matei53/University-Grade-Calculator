name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_unigrades
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r server/requirements.txt
        pip install flake8 black isort

    - name: Lint with flake8 (entire project)
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --ignore=migrations
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics --ignore=migrations
      continue-on-error: true

    - name: Check formatting with black (entire project)
      run: |
        black --check . --exclude=venv,.git
      continue-on-error: true

    - name: Check import sorting with isort (entire project)
      run: |
        isort --check-only . --skip=venv,.git
      continue-on-error: true

    - name: Run tests with pytest
      env:
        DATABASE_URL: "postgresql://testuser:testpass@localhost:5432/test_unigrades"
        SECRET_KEY: "test-secret-key-do-not-use-in-production"
      run: |
        pytest server/tests/ -v --cov=server --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-py${{ matrix.python-version }}
        path: htmlcov/

  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r server/requirements.txt
        pip install mypy

    - name: Type check with mypy (server)
      run: |
        mypy server
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit security scan (entire project)
      run: |
        bandit -r . -ll --exclude venv,.git,.pytest_cache
      continue-on-error: true

    - name: Run Safety vulnerability check
      run: |
        safety check --json
      continue-on-error: true

  test-summary:
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Test status
      if: ${{ needs.test.result == 'failure' }}
      run: |
        echo "Tests failed or were skipped"
        exit 1
    
    - name: Success
      if: ${{ needs.test.result == 'success' }}
      run: |
        echo "All tests passed successfully!"
