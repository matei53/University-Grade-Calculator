services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gradeapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradeapp}
      POSTGRES_DB: ${POSTGRES_DB:-gradeapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradeapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/matei53/university-grade-calculator:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://gradeapp:gradeapp@db:5432/gradeapp
      SECRET_KEY: ${SECRET_KEY:-changeme}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
