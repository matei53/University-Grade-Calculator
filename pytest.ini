[pytest]
# Pytest configuration for client-side tests and agent tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directory
testpaths = tests

# Add current directory to path
pythonpath = .

# Markers for test categorization
markers =
    slow: Slow running tests (typically involving LLM agents)
    unit: Unit tests
    integration: Integration tests

# Minimum Python version
minversion = 7.0

# Verbose output
addopts = 
    -v
    --strict-markers
    --tb=short

# Default: exclude slow tests to keep CI fast
# To run slow tests: pytest -m "not skip_slow" or pytest -m slow
